name: Deploy to AWS with Terraform

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write    # Required for OIDC token exchange

jobs:
  deploy-iac:
    runs-on: ubuntu-latest
    environment: production    # Requires manual approval

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: tfsec Security Scan (hard gate)
        run: ./tfsec . --minimum-severity HIGH

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # terraform destroy is REMOVED from automated pipeline